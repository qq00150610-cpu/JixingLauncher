name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace
    
    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace
    
    - name: Upload Debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jixing-launcher-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
    
    - name: Upload Release APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jixing-launcher-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Show build outputs
      if: always()
      run: |
        echo "=== Debug APK ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug APK not found"
        echo "=== Release APK ==="
        ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "Release APK not found"
