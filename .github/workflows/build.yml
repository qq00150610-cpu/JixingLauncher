name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties 2>/dev/null || true
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks
        else
          echo "No keystore secret found, creating debug keystore"
          keytool -genkeypair -v -keystore app/release-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias jixing -storepass qq900236 -keypass qq900236 -dname "CN=JixingLauncher, OU=Dev, O=Jixing, L=Beijing, ST=Beijing, C=CN"
        fi
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --warning-mode=all 2>&1 | head -100
    
    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon 2>&1 | head -50 || echo "Release build skipped or failed"
    
    - name: Upload Debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jixing-launcher-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
    
    - name: Upload Release APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jixing-launcher-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Show build outputs
      if: always()
      run: |
        echo "=== Build Outputs ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug APK not found"
        ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "Release APK not found"
